<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
    <title>Conforthouse Living</title>

    <link rel="icon" type="image/x-icon" href="https://rbconforthouse.com/favicon.ico">
    <meta name="description" content="Encuentra tu propiedad ideal en Costa Blanca, Costa del Sol y Baleares.">

    <meta property="og:type" content="website">
    <meta property="og:title" content="Conforthouse Living">
    <meta property="og:description" content="Encuentra tu propiedad ideal en Costa Blanca, Costa del Sol y Baleares.">
    <meta property="og:url" content="https://app.conforthouseliving.com">

    <meta name="twitter:card" content="summary">
    <meta name="twitter:title" content="Conforthouse Living">
    <meta name="twitter:description" content="Encuentra tu propiedad ideal en Costa Blanca, Costa del Sol y Baleares.">

    <meta name="robots" content="noindex, nofollow">

    <!-- PWA -->
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#000000">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Conforthouse Living">
    <link rel="apple-touch-icon" href="/icons/icon-180.png">

    <style>
        :root {
            --gold: #ead8b4;
            --gold-strong: #d7b56f;
            --black: #000000;
            --panel: #0d0d0d;
            --panel-soft: #171717;
            --text: #ffffff;
            --muted: rgba(255, 255, 255, 0.72);
            --border: rgba(234, 216, 180, 0.26);
            --danger: #ffcc66;
        }

        * {
            box-sizing: border-box;
        }

        html,
        body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: var(--black);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
        }

        body {
            min-height: 100dvh;
        }

        button {
            font: inherit;
        }

        iframe {
            display: block;
            width: 100vw;
            height: 100dvh;
            border: 0;
            margin: 0;
            padding: 0;
            background: #ffffff;
        }

        .app-frame {
            display: none;
            width: 100%;
            height: 100%;
        }

        .app-frame.is-visible {
            display: block;
        }

        .landing {
            position: fixed;
            inset: 0;
            z-index: 10;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: max(22px, env(safe-area-inset-top)) 20px max(22px, env(safe-area-inset-bottom));
            background:
                radial-gradient(circle at 50% 12%, rgba(234, 216, 180, 0.16), transparent 34%),
                linear-gradient(160deg, #050505 0%, #000000 52%, #101010 100%);
        }

        .landing.is-hidden {
            display: none;
        }

        .card {
            width: 100%;
            max-width: 430px;
            min-height: min(720px, calc(100dvh - 44px));
            display: flex;
            flex-direction: column;
            justify-content: center;
            gap: 18px;
            padding: 28px 22px;
            border: 1px solid var(--border);
            border-radius: 28px;
            background: rgba(13, 13, 13, 0.82);
            box-shadow: 0 24px 80px rgba(0, 0, 0, 0.55);
            backdrop-filter: blur(10px);
            text-align: center;
        }

        .brand {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 14px;
            margin-bottom: 4px;
        }

        .brand-icon {
            width: 104px;
            height: 104px;
            object-fit: contain;
            filter: drop-shadow(0 12px 26px rgba(234, 216, 180, 0.20));
        }

        .brand-logo {
            width: min(310px, 86vw);
            max-height: 82px;
            object-fit: contain;
        }

        .title {
            margin: 8px 0 0;
            font-size: clamp(26px, 8vw, 38px);
            line-height: 1;
            letter-spacing: 0.02em;
            color: var(--gold);
        }

        .subtitle {
            margin: 0 auto;
            max-width: 340px;
            font-size: 16px;
            line-height: 1.45;
            color: var(--muted);
        }

        .actions {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-top: 8px;
        }

        .btn {
            width: 100%;
            min-height: 54px;
            border: 0;
            border-radius: 999px;
            padding: 14px 18px;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.12s ease, opacity 0.12s ease, background 0.12s ease;
        }

        .btn:active {
            transform: scale(0.98);
        }

        .btn-primary {
            background: var(--gold);
            color: #101010;
            box-shadow: 0 10px 28px rgba(234, 216, 180, 0.20);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.08);
            color: var(--text);
            border: 1px solid rgba(255, 255, 255, 0.14);
        }

        .btn-ghost {
            min-height: 44px;
            background: transparent;
            color: var(--muted);
            font-weight: 600;
        }

        .help-box {
            display: none;
            margin-top: 4px;
            padding: 16px;
            border: 1px solid rgba(234, 216, 180, 0.18);
            border-radius: 18px;
            background: rgba(255, 255, 255, 0.06);
            text-align: left;
        }

        .help-box.is-visible {
            display: block;
        }

        .help-box h3 {
            margin: 0 0 10px;
            color: var(--gold);
            font-size: 16px;
        }

        .help-box p {
            margin: 8px 0;
            color: rgba(255, 255, 255, 0.84);
            font-size: 14px;
            line-height: 1.42;
        }

        .help-box strong {
            color: var(--gold);
        }

        .small-note {
            margin: 0;
            color: rgba(255, 255, 255, 0.52);
            font-size: 12px;
            line-height: 1.4;
        }

        .floating-install {
            position: fixed;
            left: 14px;
            right: 14px;
            bottom: max(14px, env(safe-area-inset-bottom));
            z-index: 20;
            display: none;
            align-items: center;
            gap: 12px;
            padding: 12px;
            border-radius: 18px;
            background: rgba(0, 0, 0, 0.86);
            border: 1px solid var(--border);
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.48);
            backdrop-filter: blur(10px);
        }

        .floating-install.is-visible {
            display: flex;
        }

        .floating-install img {
            width: 42px;
            height: 42px;
            border-radius: 11px;
            flex: 0 0 auto;
        }

        .floating-copy {
            min-width: 0;
            flex: 1;
            text-align: left;
        }

        .floating-copy strong {
            display: block;
            color: var(--gold);
            font-size: 14px;
            line-height: 1.2;
        }

        .floating-copy span {
            display: block;
            color: rgba(255, 255, 255, 0.70);
            font-size: 12px;
            line-height: 1.25;
            margin-top: 2px;
        }

        .floating-install button {
            flex: 0 0 auto;
            border: 0;
            border-radius: 999px;
            background: var(--gold);
            color: #111111;
            font-size: 13px;
            font-weight: 800;
            padding: 10px 12px;
            cursor: pointer;
        }

        .debug-panel {
            position: fixed;
            left: 10px;
            right: 10px;
            bottom: 10px;
            z-index: 99999;
            display: none;
            max-height: 44dvh;
            overflow: auto;
            padding: 12px;
            border-radius: 12px;
            background: rgba(0, 0, 0, 0.92);
            border: 1px solid rgba(255, 255, 255, 0.18);
            color: #eaeaea;
            font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
            font-size: 12px;
            line-height: 1.45;
            white-space: pre-wrap;
            text-align: left;
        }

        .debug-panel.is-visible {
            display: block;
        }

        @media (min-width: 760px) {
            .landing {
                padding: 34px;
            }

            .card {
                min-height: auto;
                padding: 34px 30px;
            }
        }
    </style>
</head>
<body>
    <main id="landing" class="landing" aria-label="Instalación Conforthouse Living">
        <section class="card">
            <div class="brand">
                <img class="brand-icon" src="/icons/icon-192.png" alt="Conforthouse Living">
                <img class="brand-logo" src="/logo-gold.png" alt="Conforthouse Living">
            </div>

            <h1 class="title">Tu app inmobiliaria</h1>
            <p id="subtitle" class="subtitle">
                Accedé a las propiedades de Conforthouse Living desde tu móvil con una experiencia rápida y directa.
            </p>

            <div id="help-box" class="help-box" aria-live="polite"></div>

            <div class="actions">
                <button id="enter-app-btn" class="btn btn-primary" type="button">Entrar a la app</button>
                <button id="install-btn" class="btn btn-secondary" type="button">Instalar acceso directo</button>
                <button id="continue-btn" class="btn btn-ghost" type="button">Continuar sin instalar</button>
            </div>

            <p id="device-note" class="small-note"></p>
        </section>
    </main>

    <section id="app-frame" class="app-frame" aria-label="App de propiedades Conforthouse Living">
        <iframe
            id="madeeasy-frame"
            src="https://homes.madeeasy.app/conforthouse_living_luxury_real_estate"
            title="Conforthouse Living"
            allow="geolocation; clipboard-write; fullscreen"
            referrerpolicy="no-referrer-when-downgrade"
        ></iframe>
    </section>

    <aside id="floating-install" class="floating-install" aria-live="polite">
        <img src="/icons/icon-192.png" alt="">
        <div class="floating-copy">
            <strong>Conforthouse Living</strong>
            <span>Instalá el acceso directo para entrar más rápido.</span>
        </div>
        <button id="floating-install-btn" type="button">Instalar</button>
    </aside>

    <pre id="debug-panel" class="debug-panel"></pre>

    <script>
        (function () {
            'use strict';

            var MADEEASY_URL = 'https://homes.madeeasy.app/conforthouse_living_luxury_real_estate';
            var DISMISS_KEY = 'cf_install_dismissed_until';
            var ENTERED_KEY = 'cf_app_entered';
            var DISMISS_DAYS = 7;
            var FLOATING_DELAY_MS = 3500;

            var ua = navigator.userAgent || '';
            var isIOS = /iPad|iPhone|iPod/.test(ua) || (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);
            var isAndroid = /Android/i.test(ua);
            var isMobile = isIOS || isAndroid || /Mobi|Mobile/i.test(ua);
            var isStandalone = window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone === true;
            var isSafari = /^((?!chrome|android).)*safari/i.test(ua);
            var isInAppBrowser = /FBAN|FBAV|Instagram|Line|Twitter|TikTok|LinkedInApp|Pinterest|GSA|CriOS|FxiOS|EdgiOS/i.test(ua) && isIOS;
            var isDebug = new URLSearchParams(window.location.search).has('debug');

            var deferredPrompt = null;
            var serviceWorkerStatus = 'no soportado';
            var promptStatus = 'no recibido';

            var landing = document.getElementById('landing');
            var appFrame = document.getElementById('app-frame');
            var installBtn = document.getElementById('install-btn');
            var enterAppBtn = document.getElementById('enter-app-btn');
            var continueBtn = document.getElementById('continue-btn');
            var floatingInstall = document.getElementById('floating-install');
            var floatingInstallBtn = document.getElementById('floating-install-btn');
            var helpBox = document.getElementById('help-box');
            var deviceNote = document.getElementById('device-note');
            var debugPanel = document.getElementById('debug-panel');

            function safeLocalStorageGet(key) {
                try {
                    return localStorage.getItem(key);
                } catch (error) {
                    return null;
                }
            }

            function safeLocalStorageSet(key, value) {
                try {
                    localStorage.setItem(key, value);
                } catch (error) {
                    // Algunos navegadores privados pueden bloquear localStorage.
                }
            }

            function isDismissed() {
                if (isDebug) return false;

                var until = safeLocalStorageGet(DISMISS_KEY);
                if (!until) return false;

                var timestamp = parseInt(until, 10);
                if (!timestamp) return false;

                return Date.now() < timestamp;
            }

            function dismissForDays(days) {
                var ms = days * 24 * 60 * 60 * 1000;
                safeLocalStorageSet(DISMISS_KEY, String(Date.now() + ms));
            }

            function setHelp(content) {
                helpBox.innerHTML = content;
                helpBox.classList.add('is-visible');
            }

            function clearHelp() {
                helpBox.innerHTML = '';
                helpBox.classList.remove('is-visible');
            }

            function showApp() {
                safeLocalStorageSet(ENTERED_KEY, '1');
                landing.classList.add('is-hidden');
                appFrame.classList.add('is-visible');
                clearHelp();

                if (!isStandalone && isMobile && !isDismissed()) {
                    setTimeout(function () {
                        floatingInstall.classList.add('is-visible');
                    }, FLOATING_DELAY_MS);
                }
            }

            function showInstallInstructions() {
                floatingInstall.classList.remove('is-visible');

                if (isStandalone) {
                    setHelp(
                        '<h3>La app ya está instalada</h3>' +
                        '<p>Ya estás usando Conforthouse Living como acceso directo instalado.</p>'
                    );
                    return;
                }

                if (isInAppBrowser) {
                    setHelp(
                        '<h3>Abrila en Safari o Chrome</h3>' +
                        '<p>Este navegador interno no permite instalar accesos directos correctamente.</p>' +
                        '<p>Usá la opción <strong>Abrir en navegador</strong> y luego instalala desde Safari o Chrome.</p>'
                    );
                    return;
                }

                if (isIOS) {
                    if (!isSafari) {
                        setHelp(
                            '<h3>En iPhone se instala desde Safari</h3>' +
                            '<p>Abrí esta página en <strong>Safari</strong>.</p>' +
                            '<p>Después tocá <strong>Compartir</strong> y elegí <strong>Añadir a pantalla de inicio</strong>.</p>'
                        );
                        return;
                    }

                    setHelp(
                        '<h3>Instalar en iPhone</h3>' +
                        '<p>1. Tocá el botón <strong>Compartir</strong> de Safari.</p>' +
                        '<p>2. Elegí <strong>Añadir a pantalla de inicio</strong>.</p>' +
                        '<p>3. Confirmá tocando <strong>Añadir</strong>.</p>'
                    );
                    return;
                }

                if (isAndroid) {
                    if (deferredPrompt) {
                        deferredPrompt.prompt();
                        deferredPrompt.userChoice.then(function (choice) {
                            if (choice.outcome === 'accepted') {
                                dismissForDays(365);
                                floatingInstall.classList.remove('is-visible');
                                clearHelp();
                            } else {
                                setHelp(
                                    '<h3>Instalación cancelada</h3>' +
                                    '<p>Podés seguir usando la app desde el navegador o volver a intentar la instalación más tarde.</p>'
                                );
                            }

                            deferredPrompt = null;
                            promptStatus = 'usado';
                            updateDebug();
                        });
                        return;
                    }

                    setHelp(
                        '<h3>Instalar en Android</h3>' +
                        '<p>Si Chrome todavía no muestra el instalador automático, tocá el menú de los tres puntos y elegí <strong>Añadir a pantalla de inicio</strong> o <strong>Instalar app</strong>.</p>' +
                        '<p>El aviso nativo puede tardar unos segundos y depende del navegador.</p>'
                    );
                    return;
                }

                setHelp(
                    '<h3>Instalación disponible en móvil</h3>' +
                    '<p>La instalación está pensada para Android Chrome y iPhone Safari.</p>' +
                    '<p>Desde escritorio podés continuar usando la versión web.</p>'
                );
            }

            function updateDeviceNote() {
                if (isStandalone) {
                    deviceNote.textContent = 'Modo app instalado detectado.';
                    return;
                }

                if (isInAppBrowser) {
                    deviceNote.textContent = 'Detectamos un navegador interno. Para instalar, abrilo en Safari o Chrome.';
                    return;
                }

                if (isIOS) {
                    deviceNote.textContent = 'En iPhone la instalación se realiza desde Safari con Compartir > Añadir a pantalla de inicio.';
                    return;
                }

                if (isAndroid) {
                    deviceNote.textContent = 'En Android, Chrome puede mostrar el instalador automático o permitir Añadir a pantalla de inicio.';
                    return;
                }

                deviceNote.textContent = 'Esta experiencia está optimizada para móviles.';
            }

            function updateDebug() {
                if (!isDebug) return;

                debugPanel.classList.add('is-visible');
                debugPanel.textContent = [
                    'CONFORTHOUSE PWA DEBUG',
                    'url: ' + window.location.href,
                    'madeeasy: ' + MADEEASY_URL,
                    'userAgent: ' + ua,
                    'isMobile: ' + isMobile,
                    'isIOS: ' + isIOS,
                    'isAndroid: ' + isAndroid,
                    'isSafari: ' + isSafari,
                    'isInAppBrowser: ' + isInAppBrowser,
                    'isStandalone: ' + isStandalone,
                    'beforeinstallprompt: ' + promptStatus,
                    'deferredPrompt: ' + Boolean(deferredPrompt),
                    'serviceWorker: ' + serviceWorkerStatus,
                    'dismissed: ' + isDismissed(),
                    'dismissedUntil: ' + (safeLocalStorageGet(DISMISS_KEY) || 'null'),
                    'enteredBefore: ' + (safeLocalStorageGet(ENTERED_KEY) || 'null'),
                    'manifest: /manifest.json',
                    'sw: /service-worker.js'
                ].join('\n');
            }

            window.addEventListener('beforeinstallprompt', function (event) {
                event.preventDefault();
                deferredPrompt = event;
                promptStatus = 'recibido';
                installBtn.textContent = 'Instalar app';
                updateDebug();
            });

            window.addEventListener('appinstalled', function () {
                deferredPrompt = null;
                promptStatus = 'app instalada';
                dismissForDays(365);
                floatingInstall.classList.remove('is-visible');
                clearHelp();
                updateDebug();
            });

            if ('serviceWorker' in navigator) {
                serviceWorkerStatus = 'registrando';

                window.addEventListener('load', function () {
                    navigator.serviceWorker.register('/service-worker.js')
                        .then(function (registration) {
                            serviceWorkerStatus = 'registrado: ' + registration.scope;
                            updateDebug();
                        })
                        .catch(function (error) {
                            serviceWorkerStatus = 'error: ' + error.message;
                            updateDebug();
                        });
                });
            }

            enterAppBtn.addEventListener('click', function () {
                showApp();
                updateDebug();
            });

            continueBtn.addEventListener('click', function () {
                dismissForDays(DISMISS_DAYS);
                showApp();
                updateDebug();
            });

            installBtn.addEventListener('click', function () {
                showInstallInstructions();
                updateDebug();
            });

            floatingInstallBtn.addEventListener('click', function () {
                landing.classList.remove('is-hidden');
                appFrame.classList.remove('is-visible');
                showInstallInstructions();
                updateDebug();
            });

            updateDeviceNote();

            if (isStandalone) {
                showApp();
            } else if (!isMobile && !isDebug) {
                showApp();
            } else if (safeLocalStorageGet(ENTERED_KEY) === '1' && isDismissed()) {
                showApp();
            }

            updateDebug();
        })();
    </script>
</body>
</html>
